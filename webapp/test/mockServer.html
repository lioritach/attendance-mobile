<!DOCTYPE HTML>
<html>
	<head>
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta charset="utf-8">
		<title>MockServerTutorial</title>
		<script id="sap-ui-bootstrap"
			src="../resources/sap-ui-core.js"
			data-sap-ui-libs="sap.m"
			data-sap-ui-theme="sap_fiori_3"
			data-sap-ui-xx-bindingSyntax="complex"
			data-sap-ui-xx-densityaware="false"
			data-sap-ui-flexibilityServices="false"
			data-sap-ui-compatVersion="edge"
     		data-sap-ui-async="true"
      		data-sap-ui-frameOptions="trusted"
			data-sap-ui-resourceroots='{"attendanceshabas.attendanceshabas": "../"}'>
		</script>
		<link rel="stylesheet" type="text/css" href="../css/style.css">
		<script>
			sap.ui.getCore().attachInit(function() {
				sap.ui.require([
					"attendanceshabas/attendanceshabas/localService/mockserver",
					"sap/m/Shell",
					"sap/ui/core/ComponentContainer"
				], function (mockserver, Shell, ComponentContainer) {
					mockserver.init();
					sap.ui.core.Component.create({
					name: "attendanceshabas.attendanceshabas",
					// Optional: add async: true if not using manifest-first loading
					}).then(function(oComponent) {
					// Component is created asynchronously
					var oContainer = new sap.ui.core.ComponentContainer({
						component: oComponent,
						async: true
					});
					oContainer.placeAt("content"); // Or appropriate container
				});
				});
			});
		</script>
	</head>
	<body class="sapUiBody" id="content">
	</body>
</html>
